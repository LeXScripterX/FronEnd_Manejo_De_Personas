<div class="page-container">
  <div class="page-header">
    <h2>{{ isEdit ? 'Editar Usuario' : 'Nuevo Usuario' }}</h2>
  </div>

  <div *ngIf="error" class="error-state">
    <p>{{ error }}</p>
  </div>

  <form (ngSubmit)="save()" class="form-card">
    <div class="form-group">
      <label for="nombre">Nombre</label>
      <input
        id="nombre"
        type="text"
        [(ngModel)]="usuario.nombre"
        name="nombre"
        placeholder="Nombre completo"
        required
      />
    </div>

    <div class="form-group">
      <label for="correo">Correo Electrónico</label>
      <input
        id="correo"
        type="email"
        [(ngModel)]="usuario.correo"
        name="correo"
        placeholder="correo@ejemplo.com"
        required
      />
    </div>

    <div class="form-group" *ngIf="!isEdit">
      <label for="password">Contraseña</label>
      <input
        id="password"
        type="password"
        [(ngModel)]="usuario.password"
        name="password"
        placeholder="Contraseña"
        required
      />
    </div>

    <div class="form-group">
      <label for="rol">Rol</label>
      <select
        id="rol"
        [(ngModel)]="usuario.rol_id"
        name="rol_id"
        required
      >
        <option [value]="0" disabled>Seleccionar rol...</option>
        <option *ngFor="let r of roles" [value]="r.id">{{ r.nombre }}</option>
      </select>
    </div>

    <div class="form-actions">
      <button type="button" (click)="cancel()" class="btn btn-secondary">Cancelar</button>
      <button type="submit" [disabled]="loading" class="btn btn-primary">
        {{ loading ? 'Guardando...' : (isEdit ? 'Actualizar' : 'Crear') }}
      </button>
    </div>
  </form>
</div>
