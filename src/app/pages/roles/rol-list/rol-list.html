<div class="page-container">
  <div class="page-header">
    <h2>Gestión de Roles</h2>
    <a routerLink="/main/roles/crear" class="btn btn-primary">+ Nuevo Rol</a>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="loading-state">
    <div class="spinner"></div>
    <p>Cargando roles...</p>
  </div>

  <!-- Error -->
  <div *ngIf="error" class="error-state">
    <p>{{ error }}</p>
    <button (click)="loadRoles()" class="btn btn-secondary">Reintentar</button>
  </div>

  <!-- Tabla -->
  <div *ngIf="!loading && !error" class="table-wrapper">
    <table class="data-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Descripción</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let rol of roles">
          <td>{{ rol.id }}</td>
          <td>{{ rol.nombre }}</td>
          <td>{{ rol.descripcion || '—' }}</td>
          <td class="actions">
            <a [routerLink]="['/main/roles/editar', rol.id]" class="btn-icon edit" title="Editar">✏️</a>
            <button (click)="deleteRol(rol.id!)" class="btn-icon delete" title="Eliminar">🗑️</button>
          </td>
        </tr>
        <tr *ngIf="roles.length === 0">
          <td colspan="4" class="empty-state">No hay roles registrados</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
