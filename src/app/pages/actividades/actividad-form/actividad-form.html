<div class="page-container">
  <div class="page-header">
    <h2>{{ isEdit ? 'Editar Actividad' : 'Nueva Actividad' }}</h2>
  </div>

  <div *ngIf="error" class="error-state">
    <p>{{ error }}</p>
  </div>

  <form (ngSubmit)="save()" class="form-card">
    <div class="form-group">
      <label for="titulo">Título</label>
      <input id="titulo" type="text" [(ngModel)]="actividad.titulo" name="titulo" placeholder="Título de la actividad" required />
    </div>

    <div class="form-group">
      <label for="descripcion">Descripción</label>
      <textarea id="descripcion" [(ngModel)]="actividad.descripcion" name="descripcion" placeholder="Descripción detallada..." rows="3" required></textarea>
    </div>

    <div class="form-group">
      <label for="estado">Estado</label>
      <select id="estado" [(ngModel)]="actividad.estado" name="estado" required>
        <option *ngFor="let e of estados" [value]="e">{{ e }}</option>
      </select>
    </div>

    <div class="form-group">
      <label for="usuario">Usuario Asignado</label>
      <select id="usuario" [(ngModel)]="actividad.usuario_id" name="usuario_id" required>
        <option [value]="0" disabled>Seleccionar usuario...</option>
        <option *ngFor="let u of usuarios" [value]="u.id">{{ u.nombre }}</option>
      </select>
    </div>

    <div class="form-group">
      <label for="fecha_inicio">Fecha Inicio</label>
      <input id="fecha_inicio" type="date" [(ngModel)]="actividad.fecha_inicio" name="fecha_inicio" />
    </div>

    <div class="form-group">
      <label for="fecha_fin">Fecha Fin</label>
      <input id="fecha_fin" type="date" [(ngModel)]="actividad.fecha_fin" name="fecha_fin" />
    </div>

    <div class="form-actions">
      <button type="button" (click)="cancel()" class="btn btn-secondary">Cancelar</button>
      <button type="submit" [disabled]="loading" class="btn btn-primary">
        {{ loading ? 'Guardando...' : (isEdit ? 'Actualizar' : 'Crear') }}
      </button>
    </div>
  </form>
</div>
