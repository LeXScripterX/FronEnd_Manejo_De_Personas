<div class="dashboard">
  <div class="welcome-card">
    <h1>Bienvenido, {{ userName }}</h1>
    <p class="role-badge">Rol: {{ userRole }}</p>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon">👥</div>
      <div class="stat-info">
        <h3>Usuarios</h3>
        <p>Gestión de usuarios del sistema</p>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-icon">🔑</div>
      <div class="stat-info">
        <h3>Roles</h3>
        <p>Administración de roles y permisos</p>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-icon">📋</div>
      <div class="stat-info">
        <h3>Actividades</h3>
        <p>Control y seguimiento de actividades</p>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-icon">📊</div>
      <div class="stat-info">
        <h3>Reportes</h3>
        <p>Registros e historial del sistema</p>
      </div>
    </div>
  </div>
</div>
